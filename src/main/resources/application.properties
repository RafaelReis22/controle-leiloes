# ===================================================
# Controle de Leilões — application.properties
# ===================================================

# PostgreSQL — configure via variáveis de ambiente (nunca commitar senha real)
# Defina DB_URL, DB_USERNAME e DB_PASSWORD no ambiente ou em application-local.properties (no .gitignore)
spring.datasource.url=jdbc:postgresql://localhost:5432/leiloes_db
spring.datasource.username=postgres
spring.datasource.password=maneger

# Hibernate / JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Inicialização automática do banco de dados (schema.sql e seed.sql)
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:db/schema.sql
spring.sql.init.data-locations=classpath:db/seed.sql

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# Servidor
server.port=8080
spring.application.name=controle-leiloes
