<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head(title='Agendar Leilão')}"></head>
<body>
    <header th:replace="~{layout/base :: header}"></header>

    <main class="app-main">
        <div class="page-header" style="max-width: 650px; margin: 0 auto 2.5rem auto;">
            <div class="page-title-section">
                <h1 class="page-title">Agendar Novo Leilão</h1>
                <p class="page-subtitle">Configure o tipo, lote e horários do novo leilão.</p>
            </div>
        </div>

        <div class="form-card">
            <!-- Alerta de erro genérico -->
            <div th:if="${erro}" style="margin-bottom: 1.5rem; padding: 1rem; background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); border-radius: 8px; color: #ef4444; font-weight: 500;">
                ⚠️ <span th:text="${erro}">Ocorreu um erro ao agendar o leilão.</span>
            </div>

            <form th:action="@{/leiloes/novo}" th:object="${leilao}" method="post">
                
                <div class="form-group">
                    <label for="tipo" class="form-label">Tipo do Leilão</label>
                    <select id="tipo" th:field="*{tipo}" class="form-control">
                        <option value="" disabled selected>Selecione o tipo do leilão...</option>
                        <option value="ABERTO">ABERTO (Lances visíveis durante o andamento)</option>
                        <option value="FECHADO">FECHADO (Lances ocultos até o encerramento)</option>
                    </select>
                    <span class="form-error" th:if="${#fields.hasErrors('tipo')}" th:errors="*{tipo}">Erro de tipo</span>
                </div>

                <div class="form-group">
                    <label for="idLote" class="form-label">Lote a ser Leiloado</label>
                    <select id="idLote" th:field="*{idLote}" class="form-control">
                        <option value="" disabled selected>Selecione o lote...</option>
                        <option th:each="lote : ${lotes}" th:value="${lote.id}" th:text="'Lote #' + ${lote.id} + ' - ' + ${lote.descricao} + ' (Preço Mínimo: ' + ${#numbers.formatCurrency(lote.precoMinimo)} + ')'">Lote</option>
                    </select>
                    <span class="form-error" th:if="${#fields.hasErrors('idLote')}" th:errors="*{idLote}">Erro de lote</span>
                </div>

                <div class="form-group">
                    <label for="idResponsavel" class="form-label">Usuário Responsável (Leiloeiro)</label>
                    <select id="idResponsavel" th:field="*{idResponsavel}" class="form-control">
                        <option value="" disabled selected>Selecione o leiloeiro...</option>
                        <option th:each="usuario : ${usuarios}" th:value="${usuario.id}" th:text="${usuario.nome} + ' (CPF/CNPJ: ' + ${usuario.cpfCnpj} + ')'">Usuário</option>
                    </select>
                    <span class="form-error" th:if="${#fields.hasErrors('idResponsavel')}" th:errors="*{idResponsavel}">Erro de leiloeiro</span>
                </div>

                <div class="form-group">
                    <label for="dataInicio" class="form-label">Data e Hora de Início</label>
                    <input type="datetime-local" id="dataInicio" th:field="*{dataInicio}" class="form-control">
                    <span class="form-error" th:if="${#fields.hasErrors('dataInicio')}" th:errors="*{dataInicio}">Erro de data de início</span>
                </div>

                <div class="form-group">
                    <label for="dataTermino" class="form-label">Data e Hora de Término</label>
                    <input type="datetime-local" id="dataTermino" th:field="*{dataTermino}" class="form-control">
                    <span class="form-error" th:if="${#fields.hasErrors('dataTermino')}" th:errors="*{dataTermino}">Erro de data de término</span>
                </div>

                <div class="form-actions">
                    <a th:href="@{/leiloes}" class="btn btn-secondary">Cancelar</a>
                    <button type="submit" class="btn btn-primary">Agendar Leilão</button>
                </div>
            </form>
        </div>
    </main>

    <footer th:replace="~{layout/base :: footer}"></footer>
</body>
</html>
