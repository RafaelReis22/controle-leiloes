<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head(title='Cadastrar Lote')}"></head>
<body>
    <header th:replace="~{layout/base :: header}"></header>

    <main class="app-main">
        <div class="page-header" style="max-width: 650px; margin: 0 auto 2.5rem auto;">
            <div class="page-title-section">
                <h1 class="page-title">Cadastrar Novo Lote</h1>
                <p class="page-subtitle">Preencha as informações para registrar um novo lote de bens.</p>
            </div>
        </div>

        <div class="form-card">
            <!-- Alerta de erro genérico -->
            <div th:if="${erro}" style="margin-bottom: 1.5rem; padding: 1rem; background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); border-radius: 8px; color: #ef4444; font-weight: 500;">
                ⚠️ <span th:text="${erro}">Ocorreu um erro ao salvar o lote.</span>
            </div>

            <form th:action="@{/lotes/novo}" th:object="${lote}" method="post">
                
                <div class="form-group">
                    <label for="descricao" class="form-label">Descrição do Lote</label>
                    <textarea id="descricao" th:field="*{descricao}" class="form-control" rows="3" placeholder="Digite uma descrição detalhada para o lote..."></textarea>
                    <span class="form-error" th:if="${#fields.hasErrors('descricao')}" th:errors="*{descricao}">Erro de descrição</span>
                </div>

                <div class="form-group">
                    <label for="precoMinimo" class="form-label">Preço Mínimo (R$)</label>
                    <input type="number" step="0.01" id="precoMinimo" th:field="*{precoMinimo}" class="form-control" placeholder="0.00">
                    <span class="form-error" th:if="${#fields.hasErrors('precoMinimo')}" th:errors="*{precoMinimo}">Erro de preço mínimo</span>
                </div>

                <div class="form-group">
                    <label for="idResponsavel" class="form-label">Usuário Responsável</label>
                    <select id="idResponsavel" th:field="*{idResponsavel}" class="form-control">
                        <option value="" disabled selected>Selecione o usuário responsável...</option>
                        <option th:each="usuario : ${usuarios}" th:value="${usuario.id}" th:text="${usuario.nome} + ' (CPF/CNPJ: ' + ${usuario.cpfCnpj} + ')'">Usuário</option>
                    </select>
                    <span class="form-error" th:if="${#fields.hasErrors('idResponsavel')}" th:errors="*{idResponsavel}">Erro de responsável</span>
                </div>

                <div class="form-group">
                    <label class="form-label">Bens Associados ao Lote</label>
                    <div class="checkbox-list">
                        <label th:each="bem : ${bens}" class="checkbox-item">
                            <input type="checkbox" th:field="*{idsBens}" th:value="${bem.id}">
                            <span th:text="${bem.descricaoBreve} + ' [' + ${bem.categoria.nome} + ']'">Bem</span>
                        </label>
                    </div>
                    <span class="form-error" th:if="${#fields.hasErrors('idsBens')}" th:errors="*{idsBens}">Erro de bens</span>
                </div>

                <div class="form-actions">
                    <a th:href="@{/lotes}" class="btn btn-secondary">Cancelar</a>
                    <button type="submit" class="btn btn-primary">Salvar Lote</button>
                </div>
            </form>
        </div>
    </main>

    <footer th:replace="~{layout/base :: footer}"></footer>
</body>
</html>
