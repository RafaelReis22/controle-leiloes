<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head(title='Página Não Encontrada')}"></head>
<body>
    <header th:replace="~{layout/base :: header}"></header>

    <main class="app-main" style="display: flex; justify-content: center; align-items: center; min-height: 60vh;">
        <div class="section-box" style="max-width: 500px; text-align: center; padding: 3rem; box-shadow: 0 8px 30px rgba(0, 0, 0, 0.05); border-radius: 12px;">
            <div style="font-size: 4rem; margin-bottom: 1rem;">🔍</div>
            <h1 class="page-title" style="font-size: 2rem; margin-bottom: 0.5rem;">404 - Não Encontrado</h1>
            <p style="color: var(--text-secondary); margin-bottom: 2rem;" th:text="${mensagem != null ? mensagem : 'O leilão, lote ou recurso que você tentou acessar não foi localizado ou não existe.'}">Recurso não encontrado.</p>
            <a th:href="@{/leiloes}" class="btn btn-primary">Voltar para Início</a>
        </div>
    </main>

    <footer th:replace="~{layout/base :: footer}"></footer>
</body>
</html>
